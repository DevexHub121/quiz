{% extends "layout.html" %}

{% block content %}
<div class="auth-card no-card">
    <h1>Welcome to Devexhub Exam Portal</h1>
    <p>Please enter your details to start.</p>
    
    <form action="{{ url_for('auth.validate') }}" method="POST">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" required minlength="3" pattern="[A-Za-z\s]+" title="Name should only contain letters and spaces" placeholder="John Doe">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required placeholder="john@example.com">
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <div class="phone-input-group">
                <span class="country-code">+91</span>
                <input type="text" name="phone" required pattern="[0-9]{10}" maxlength="10" title="Please enter a valid 10-digit phone number" placeholder="9876543210" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
            </div>
        </div>
        <input type="hidden" name="token" value="{{ prefilled_token or 'QUIZ-2026-TEST' }}">
        <button type="submit" class="btn-primary">Start Exam</button>
    </form>
</div>


{% endblock %}
