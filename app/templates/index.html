{% extends "layout.html" %}

{% block content %}
<div class="auth-card glass">
    <h1>Welcome to the Examination</h1>
    <p>Please enter your details to start.</p>
    
    <form action="{{ url_for('auth.validate') }}" method="POST">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" required minlength="3" placeholder="John Doe">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required placeholder="john@example.com">
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" name="phone" required pattern="[0-9]{10,12}" title="Please enter a valid phone number (10-12 digits)" placeholder="9876543210">
        </div>
        <div class="form-group">
            <label>Exam Token</label>
            <input type="text" name="token" value="{{ prefilled_token or 'QUIZ-2026-TEST' }}" readonly style="background-color: #f1f5f9; cursor: not-allowed; color: #64748b; font-weight: 600;">
            <small style="color: var(--text-muted); font-size: 0.8rem;">Token is automatically applied via your entry link.</small>
        </div>
        <button type="submit" class="btn-primary">Start Exam</button>
    </form>
</div>

<script>
    document.querySelectorAll('input:not([readonly])').forEach(input => {
        input.addEventListener('blur', function() {
            if (!this.checkValidity()) {
                this.classList.add('is-invalid');
                this.reportValidity();
            } else {
                this.classList.remove('is-invalid');
            }
        });
        
        input.addEventListener('input', function() {
            if (this.checkValidity()) {
                this.classList.remove('is-invalid');
            }
        });
    });
</script>
{% endblock %}
