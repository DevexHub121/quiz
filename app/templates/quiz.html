{% extends "layout.html" %}

{% block content %}
<div class="quiz-container">
    <div class="quiz-header glass">
        <div class="student-info">
            <strong>Candidate:</strong> {{ session.student_name }} ({{ session.student_email }})
        </div>
        <div id="timer" class="timer-badge">Loading Timer...</div>
    </div>

    <form id="quizForm" action="{{ url_for('quiz.submit') }}" method="POST">
        {% for q in questions %}
        {% set i = loop.index0 %}
        <div class="question-card glass">
            <span class="section-tag">{{ q.section }}</span>
            <h3>Q{{ i+1 }}: {{ q.question }}</h3>
            <div class="options">
                <label class="option">
                    <input type="radio" name="q_{{ i }}" value="1" required>
                    <span>{{ q.option1 }}</span>
                </label>
                <label class="option">
                    <input type="radio" name="q_{{ i }}" value="2">
                    <span>{{ q.option2 }}</span>
                </label>
                <label class="option">
                    <input type="radio" name="q_{{ i }}" value="3">
                    <span>{{ q.option3 }}</span>
                </label>
                <label class="option">
                    <input type="radio" name="q_{{ i }}" value="4">
                    <span>{{ q.option4 }}</span>
                </label>
            </div>
        </div>
        {% endfor %}
        
        <div class="quiz-footer">
            <button type="submit" class="btn-submit">Submit Final Answers</button>
        </div>
    </form>
</div>

<script>
    const startTime = new Date("{{ session.start_time.strftime('%Y-%m-%dT%H:%M:%S') }}Z");
    const durationMinutes = 15; // Set to 15 minutes as requested
    const endTime = new Date(startTime.getTime() + durationMinutes * 60000);

    function updateTimer() {
        const now = new Date();
        const diff = endTime - now;

        if (diff <= 0) {
            document.getElementById('timer').innerText = "TIME EXPIRED";
            document.getElementById('timer').style.background = "#ef4444";
            
            // Auto-submit form
            setTimeout(() => {
                document.getElementById('quizForm').submit();
            }, 1000);
            return;
        }

        const mins = Math.floor(diff / 60000);
        const secs = Math.floor((diff % 60000) / 1000);
        document.getElementById('timer').innerText = `Time Left: ${mins}:${secs.toString().padStart(2, '0')}`;
        
        // Visual warning for last 2 minutes
        if (diff < 120000) {
            document.getElementById('timer').style.background = "#fee2e2";
            document.getElementById('timer').style.color = "#ef4444";
            document.getElementById('timer').style.border = "1px solid #ef4444";
        }
    }

    setInterval(updateTimer, 1000);
    updateTimer();
</script>

<style>
    .section-tag {
        display: inline-block;
        background: #e2e8f0;
        color: #475569;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        margin-bottom: 0.5rem;
    }
</style>
{% endblock %}
